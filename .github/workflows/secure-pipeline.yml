name: Secure ML CI/CD Pipeline

on:
  pull_request:
    branches: [test]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-review:
    name: ML security review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      scan_status: ${{ steps.scan.outputs.scan_status }}
      scan_probability: ${{ steps.scan.outputs.scan_probability }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate code before scan
        run: |
          python -m ruff check .
          python -m pytest -q

      - name: Notify security review start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_telegram.py --message "Security review started for PR #${{ github.event.number }}: ${{ github.head_ref }} -> ${{ github.base_ref }}"

      - name: Prepare model
        run: |
          if [ ! -f models/vulnerability_model.joblib ]; then
            echo "Model not found. Generating dataset and training..."
            python scripts/generate_owasp_dataset.py
            python -m app.interfaces.cli train --use-owasp
          else
            echo "Model found. Skipping training."
          fi

      - name: Detect changed source files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt

      - name: Analyze PR changes
        id: scan
        shell: bash
        run: |
          set +e
          python scripts/analyze_pr_diff.py --changed-files /tmp/changed_files.txt --output reports/pr_security_scan.json
          EXIT_CODE=$?
          STATUS=$(python -c "import json; print(json.load(open('reports/pr_security_scan.json'))['status'])")
          PROB=$(python -c "import json; print(json.load(open('reports/pr_security_scan.json'))['probability'])")
          echo "scan_status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "scan_probability=${PROB}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-security-scan
          path: reports/pr_security_scan.json

      - name: Comment safe result
        if: steps.scan.outputs.scan_status == 'SAFE'
        uses: actions/github-script@v7
        with:
          script: |
            const probability = '${{ steps.scan.outputs.scan_probability }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Security ML review passed. Maximum vulnerability probability: ${probability}.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['security-approved']
            }).catch(() => {});

      - name: Notify safe result
        if: steps.scan.outputs.scan_status == 'SAFE'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_telegram.py --message "Security review passed for PR #${{ github.event.number }}. Probability: ${{ steps.scan.outputs.scan_probability }}"

      - name: Handle vulnerable result
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {status: 'ERROR', probability: 0, details: 'Scan report unavailable', files: []};
            if (fs.existsSync('reports/pr_security_scan.json')) {
              report = JSON.parse(fs.readFileSync('reports/pr_security_scan.json', 'utf8'));
            }
            const body = [
              `Security ML review result: **${report.status}**`,
              `Probability: **${report.probability}**`,
              '',
              report.details,
              '',
              'The merge is blocked until the vulnerable code is corrected.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['fixing-required']
            }).catch(() => {});
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[fixing-required] Security review failed for PR #${context.issue.number}`,
              body,
              labels: ['fixing-required', 'security-vulnerable']
            });

      - name: Notify vulnerable result
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_telegram.py --message "Security review blocked PR #${{ github.event.number }}. Check GitHub for details."

  tests-and-merge-test:
    name: Tests and merge to test
    runs-on: ubuntu-latest
    needs: security-review
    if: needs.security-review.outputs.scan_status == 'SAFE'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Merge PR to test
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge',
              commit_title: `Merge PR #${context.issue.number} after secure review`
            });

      - name: Notify merge to test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_telegram.py --message "PR #${{ github.event.number }} merged to test after tests passed."

  merge-main-and-deploy:
    name: Merge main and deploy
    runs-on: ubuntu-latest
    needs: tests-and-merge-test
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge test into main
        run: |
          git config user.email "secure-pipeline@users.noreply.github.com"
          git config user.name "Secure Pipeline"
          git fetch origin test
          git merge origin/test --no-ff -m "chore: merge test into main after secure pipeline"
          git push origin main

      - name: Build Docker image
        run: docker build -t secure-datamining-api:${{ github.sha }} .

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured; skipping Render deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Notify deploy result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_telegram.py --message "Main merge/build/deploy finished for PR #${{ github.event.number }} with status: ${{ job.status }}."
