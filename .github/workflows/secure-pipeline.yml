name: Secure ML CI/CD Pipeline

on:
  pull_request:
    branches: [test]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-review:
    name: ML security review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      scan_status: ${{ steps.scan.outputs.scan_status }}
      scan_probability: ${{ steps.scan.outputs.scan_probability }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate code before scan
        run: |
          python -m ruff check .
          python -m pytest -q

      - name: Notify security review start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚀 <b>Security Review Started</b>%0A"
          MSG="${MSG}PR: #${{ github.event.number }}%0A"
          MSG="${MSG}Branch: <code>${{ github.head_ref }}</code> -> <code>${{ github.base_ref }}</code>%0A"
          MSG="${MSG}Initiated by: ${{ github.actor }}"
          python scripts/send_telegram.py --message "$MSG"

      - name: Prepare model
        run: |
          if [ ! -f models/vulnerability_model.joblib ]; then
            echo "Model not found. Generating dataset and training..."
            python scripts/generate_owasp_dataset.py
            python -m app.interfaces.cli train --use-owasp
          else
            echo "Model found. Skipping training."
          fi

      - name: Detect changed source files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt

      - name: Analyze PR changes
        id: scan
        shell: bash
        run: |
          python scripts/analyze_pr_diff.py --changed-files /tmp/changed_files.txt --output reports/pr_security_scan.json
          STATUS=$(python -c "import json; print(json.load(open('reports/pr_security_scan.json'))['status'])")
          PROB=$(python -c "import json; print(json.load(open('reports/pr_security_scan.json'))['probability'])")
          echo "scan_status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "scan_probability=${PROB}" >> "$GITHUB_OUTPUT"

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-security-scan
          path: reports/pr_security_scan.json

      - name: Comment safe result
        if: steps.scan.outputs.scan_status == 'SAFE'
        uses: actions/github-script@v7
        with:
          script: |
            const probability = '${{ steps.scan.outputs.scan_probability }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Security ML review passed. Maximum vulnerability probability: ${probability}.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['security-approved']
            }).catch(() => {});

      - name: Notify safe result
        if: steps.scan.outputs.scan_status == 'SAFE'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ <b>Security Review Passed</b>%0A"
          MSG="${MSG}PR: #${{ github.event.number }}%0A"
          MSG="${MSG}Max Probability: <b>${{ steps.scan.outputs.scan_probability }}</b>%0A"
          MSG="${MSG}Result: <i>SAFE</i>"
          python scripts/send_telegram.py --message "$MSG"

      - name: Handle vulnerable result
        if: steps.scan.outputs.scan_status == 'VULNERABLE'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {status: 'ERROR', probability: 0, details: 'Scan report unavailable', files: []};
            if (fs.existsSync('reports/pr_security_scan.json')) {
              report = JSON.parse(fs.readFileSync('reports/pr_security_scan.json', 'utf8'));
            }
            
            let fileDetails = '';
            if (report.files && report.files.length > 0) {
              fileDetails = '### Detailed Findings per File\n\n';
              report.files.forEach(f => {
                if (f.status === 'VULNERABLE') {
                  fileDetails += `#### 📄 \`${f.path}\`\n`;
                  fileDetails += `- **Risk Level:** ${f.risk_level} (${(f.probability * 100).toFixed(2)}%)\n`;
                  if (f.vulnerability_types && f.vulnerability_types.length > 0) {
                    fileDetails += `- **Detected Issues:** ${f.vulnerability_types.join(', ')}\n`;
                  }
                  if (f.cwe_ids && f.cwe_ids.length > 0) {
                    fileDetails += `- **CWE IDs:** ${f.cwe_ids.join(', ')}\n`;
                  }
                  if (f.features && f.features.suspicious_patterns && f.features.suspicious_patterns.length > 0) {
                    fileDetails += `- **Suspicious Patterns:** \`${f.features.suspicious_patterns.join('`, `')}\`\n`;
                  }
                  if (f.recommendations && f.recommendations.length > 0) {
                    fileDetails += `- **Recommendations:**\n  - ${f.recommendations.join('\n  - ')}\n`;
                  }
                  fileDetails += '\n';
                }
              });
            }

            const body = [
              `## 🛡️ Security ML Review Result: **${report.status}**`,
              `**Maximum Vulnerability Probability:** ${(report.probability * 100).toFixed(2)}%`,
              '',
              `> ${report.details}`,
              '',
              fileDetails,
              '---',
              '❌ **The merge is blocked** until the vulnerable code is corrected or marked as a false positive by a security lead.'
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['fixing-required']
            }).catch(() => {});
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [fixing-required] Security Vulnerabilities in PR #${context.issue.number}`,
              body,
              labels: ['fixing-required', 'security-vulnerable']
            });

      - name: Notify vulnerable result
        if: steps.scan.outputs.scan_status == 'VULNERABLE'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ <b>Security Review FAILED</b> for PR #${{ github.event.number }}%0A"
          if [ -f reports/pr_security_scan.json ]; then
            PROB=$(python -c "import json; print(json.load(open('reports/pr_security_scan.json'))['probability'])")
            MSG="${MSG}⚠️ Max Probability: <b>$PROB</b>%0A"
            VULN_FILES=$(python -c "import json; r=json.load(open('reports/pr_security_scan.json')); print(len([f for f in r['files'] if f['status'] == 'VULNERABLE']))")
            MSG="${MSG}🚫 Vulnerable files: <b>$VULN_FILES</b>%0A"
          else
            MSG="${MSG}⚠️ Error: Scan report not found or stage failed prematurely.%0A"
          fi
          MSG="${MSG}%0ACheck GitHub for detailed remediation steps."
          python scripts/send_telegram.py --message "$MSG"

  tests-and-merge-test:
    name: Tests and merge to test
    runs-on: ubuntu-latest
    needs: security-review
    if: needs.security-review.outputs.scan_status == 'SAFE'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Merge PR to test
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge',
              commit_title: `Merge PR #${context.issue.number} after secure review`
            });

      - name: Notify merge to test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧪 <b>PR Merged to Test</b>%0A"
          MSG="${MSG}PR: #${{ github.event.number }}%0A"
          MSG="${MSG}Status: <i>Tests Passed & Integrated</i>"
          python scripts/send_telegram.py --message "$MSG"

      - name: Notify test failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ <b>Tests FAILED</b> for PR #${{ github.event.number }}%0A"
          MSG="${MSG}Stage: <i>Tests and Merge to Test</i>%0A"
          MSG="${MSG}The automated merge to test was aborted."
          python scripts/send_telegram.py --message "$MSG"

  merge-main-and-deploy:
    name: Merge main and deploy
    runs-on: ubuntu-latest
    needs: tests-and-merge-test
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge test into main
        run: |
          git config user.email "secure-pipeline@users.noreply.github.com"
          git config user.name "Secure Pipeline"
          git fetch origin test
          git merge origin/test --no-ff -m "chore: merge test into main after secure pipeline"
          git push origin main

      - name: Build Docker image
        run: docker build -t secure-datamining-api:${{ github.sha }} .

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured; skipping Render deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Notify deploy result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="🚀 <b>Deployment Successful</b>%0A"
            MSG="${MSG}Environment: <i>Production (Render)</i>%0A"
          else
            MSG="⚠️ <b>Deployment/Main-Merge FAILED</b>%0A"
            MSG="${MSG}Status: <i>$STATUS</i>%0A"
            MSG="${MSG}Stage: <i>Merge Main and Deploy</i>%0A"
          fi
          MSG="${MSG}PR: #${{ github.event.number }}%0A"
          MSG="${MSG}Ref: <code>main</code>"
          python scripts/send_telegram.py --message "$MSG"
