name: Security Mining Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  security-mining:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Audit dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest -q

      - name: Generate dataset
        run: python scripts/generate_dataset.py

      - name: Train model
        run: python -m app.interfaces.cli train

      - name: Predict sample module
        run: python -m app.interfaces.cli predict --input examples/sample_module_metrics.json --shap-report reports/shap_explanation.html

      - name: Upload SHAP report
        uses: actions/upload-artifact@v4
        with:
          name: shap-report
          path: reports/shap_explanation.html
