name: Security Mining CI

on:
  push:
    branches: [main, test, dev]
  pull_request:
    branches: [main, test, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check .

      - name: Unit tests
        run: python -m pytest -q

      - name: Build OWASP sample dataset
        run: python scripts/generate_owasp_dataset.py

      - name: Train lightweight model
        run: python -m app.interfaces.cli train --use-owasp

      - name: Smoke-test prediction
        run: python -m app.interfaces.cli predict --raw-code examples/sql_injection_sample.cpp
